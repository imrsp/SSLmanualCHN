</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="icon-button menu-button" id="menuButton" type="button" aria-label="打开目录">
        <span></span><span></span><span></span>
      </button>
      <a class="brand" href="#/page/Intro">
        <span class="brand-mark">SSL</span>
        <span class="brand-copy">
          <strong>LIVE HELP</strong>
          <small>中文操作手册数据库</small>
        </span>
      </a>
      <div class="topbar-status">
        <button id="installButton" type="button" hidden>安装应用</button>
        <span class="status-light"></span>
        <span id="databaseStatus">正在载入内容库</span>
      </div>
    </header>

    <aside class="sidebar" id="sidebar">
      <div class="search-panel">
        <label id="searchLabel">搜索全部主题</label>
        <div class="search-box">
          <span class="search-symbol">⌕</span>
          <input id="searchInput" type="search" placeholder="输入功能、按钮或术语" autocomplete="off">
          <kbd>/</kbd>
        </div>
        <div class="search-summary-row">
          <span id="searchSummary">可搜索中英文标题与正文</span>
          <span class="search-toggle" id="searchToggle" for="searchEnToggle">
            <input type="checkbox" id="searchEnToggle">
            <span>搜索英文页面</span>
          </span>
        </div>
      </div>
      <nav class="manual-nav" id="manualNav" aria-label="手册目录"></nav>
      <footer class="sidebar-footer">
        <a class="sidebar-about" href="#/page/about-dmt">
          <span class="about-default">Powered by DMT Club</span>
          <span class="about-label">关于我们</span>
        </a>
        <strong id="pageCounter">00 / --</strong>
      </footer>
    </aside>

    <main class="reader">
      <div class="reader-toolbar">
        <div class="breadcrumbs" id="breadcrumbs"></div>
        <div class="reader-actions">
          <div class="preset-toggle-wrapper">
            <button id="presetToggle" type="button" aria-label="选择主题配色" aria-describedby="presetTooltip">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="none" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2.5" y="2.5" width="8" height="8" rx="1.5" fill="currentColor" opacity="0.4"/>
                <rect x="13.5" y="2.5" width="8" height="8" rx="1.5" fill="currentColor" opacity="0.7"/>
                <rect x="2.5" y="13.5" width="8" height="8" rx="1.5" fill="currentColor" opacity="0.5"/>
                <rect x="13.5" y="13.5" width="8" height="8" rx="1.5" fill="currentColor"/>
              </svg>
            </button>
            <span class="preset-tooltip" id="presetTooltip" role="tooltip">选择主题配色</span>
            <div class="preset-dropdown" id="presetDropdown" role="menu">
              <div class="preset-dropdown-items" id="presetItems"></div>
            </div>
          </div>
          <div class="theme-toggle-wrapper">
            <button id="themeToggle" type="button" aria-label="切换主题" aria-describedby="themeTooltip">
              <svg class="theme-toggle-svg" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                <g class="sun-group">
                  <circle cx="12" cy="12" r="5"/>
                  <line x1="12" y1="1" x2="12" y2="3"/>
                  <line x1="12" y1="21" x2="12" y2="23"/>
                  <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                  <line x1="1" y1="12" x2="3" y2="12"/>
                  <line x1="21" y1="12" x2="23" y2="12"/>
                  <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                  <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </g>
                <g class="moon-group">
                  <g transform="rotate(-60 12 12) translate(24,0) scale(-1,1)">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                  </g>
                </g>
              </svg>
            </button>
            <span class="theme-tooltip" id="themeTooltip" role="tooltip">点击切换深色/浅色，长按恢复跟随系统</span>
          </div>
          <button id="outlineButton" type="button">本页目录</button>
          <button id="languageToggle" type="button">中 / EN</button>
        </div>
      </div>

      <div class="reader-layout">
        <article class="document" id="document">
          <div class="loading-state">
            <span class="loader"></span>
            <p>正在读取 SSL Live 手册数据库…</p>
          </div>
        </article>
        <aside class="outline" id="outline" aria-label="本页目录"></aside>
      </div>

      <nav class="page-navigation" aria-label="前后章节">
        <button id="previousPage" type="button">
          <span>上一主题</span>
          <strong>—</strong>
        </button>
        <button id="nextPage" type="button">
          <span>下一主题</span>
          <strong>—</strong>
        </button>
      </nav>
    </main>
  </div>

  <div class="scrim" id="scrim"></div>
  <script src="./src/app.js"></script>

</html>
