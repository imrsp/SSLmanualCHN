<h2>维护</h2>
  
  <h3>防尘罩</h3>
  
 <p>您的 Live 控制台可能装有防尘罩，用于覆盖推子下方的通风口。</p>
 
<p>建议定期检查过滤泡棉，确认是否有明显的灰尘积聚。</p>

<p>拧下固定防尘罩的 M3 螺钉，检查防尘罩的两面。如有必要，请使用吸尘器进行清洁。</p> 

<p>极度脏污的过滤网可以用水清洗，晾干后再装回。</p>

<p>过滤垫通常可使用数年才需要更换。如需更换过滤垫，请联系 SSL。</p>

<span class="note"><span class="notetitle">请注意：</span>L100 控制台未配备防尘罩。</span>
