# Validate PR builds without deploying
#
# Runs on every PR targeting main to catch build failures,
# structural issues, and broken links before merge.

name: PR Check
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install fonttools for font subsetting
        run: pip install "fonttools[woff]"

      - name: Install dependencies
        run: npm ci

      - name: Build and validate
        run: npm run check
